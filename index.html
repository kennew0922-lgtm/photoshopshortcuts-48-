<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photoshop Shortcut Master</title>
    <style>
        /* --- 全体のデザイン --- */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* フォトショっぽいダークモード */
            color: #eeeeee;
        }

        /* --- 上部バナーエリア --- */
        .banner {
            width: 100%;
            height: 250px;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('top1.webp') center/cover no-repeat; /* ケンくんの画像を背景に！ */
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 3px solid #00a8ff; /* フォトショのアクセントカラー */
        }

        .banner h1 {
            font-size: 2.5rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            letter-spacing: 2px;
        }

        /* --- コンテンツエリア --- */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* --- ショートカット表 --- */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #2b2b2b;
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #3d3d3d;
        }

        th {
            background-color: #00a8ff;
            color: white;
            font-size: 1.1rem;
        }

        tr:hover {
            background-color: #353535; /* マウスを乗せると少し明るく */
        }

        .key {
            background: #444;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid #666;
            font-family: monospace;
            color: #00a8ff;
        }
    </style>
</head>
<body>

    <div class="banner">
        <h1>Photoshop Shortcuts</h1>
    </div>

    <div class="container">
        <h2>🚀 クイックリファレンス</h2>
        <table>
            <thead>
                <tr>
                    <th>アクション</th>
                    <th>ショートカットキー</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>新規レイヤー作成</td>
                    <td><span class="key">Ctrl</span> + <span class="key">Shift</span> + <span class="key">N</span></td>
                </tr>
                <tr>
                    <td>選択範囲の解除</td>
                    <td><span class="key">Ctrl</span> + <span class="key">D</span></td>
                </tr>
                <tr>
                    <td>自由変形</td>
                    <td><span class="key">Ctrl</span> + <span class="key">T</span></td>
                </tr>
                <tr>
                    <td>ブラシサイズ変更</td>
                    <td><span class="key">[</span> または <span class="key">]</span></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
